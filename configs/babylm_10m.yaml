run_name: babylm_10m
seed: 23
device: auto
output_dir: outputs/babylm_10m

data:
  hf_dataset_name: BabyLM-community/BabyLM-2026-Strict-Small
  hf_split: train
  text_column: text
  prepared_text_path: data/babylm/strict_small_10m.txt
  download_if_missing: false
  max_tokens: 10000000
  tokenizer_dir: outputs/babylm_10m/tokenizer
  vocab_size: 16000
  block_size: 256

model:
  variant: etb
  d_model: 384
  hidden_size: 384
  num_layers: 2
  dropout: 0.1
  memory_slots: 12
  memory_roles: 12
  vsa_dim: 512
  gate_threshold: 0.5
  gate_selection: topk
  target_sparsity: 0.15
  sparsity_lambda: 0.001
  budget_lambda: 0.2
  benefit_lambda: 0.2
  candidate_loss_lambda: 0.05
  benefit_temperature: 0.25
  compute_penalty: 0.1
  structural_prior_bonus: 0.2
  interference_prior_bonus: 0.1
  memory_dropout: 0.05

training:
  batch_size: 32
  max_steps: 12000
  learning_rate: 0.0006
  weight_decay: 0.01
  grad_clip: 1.0
  log_every: 50
  save_every: 1000

evaluation:
  batch_size: 16

run_name: babylm_10m_v4_audit
seed: 23
device: auto
output_dir: outputs/babylm_10m_v4_audit

data:
  prepared_text_path: data/babylm/strict_small_10000000.txt
  max_train_tokens: 1000000
  tokenizer_dir: outputs/babylm_10m_v4_audit/tokenizer
  vocab_size: 12000
  block_size: 192

model:
  variant: etb
  d_model: 192
  hidden_size: 192
  num_layers: 1
  dropout: 0.1
  memory_slots: 8
  memory_roles: 8
  vsa_dim: 256
  gate_threshold: 0.5
  gate_selection: topk
  target_sparsity: 0.15
  sparsity_lambda: 0.001
  budget_lambda: 0.02
  benefit_lambda: 0.08
  candidate_loss_lambda: 0.0
  benefit_temperature: 0.25
  compute_penalty: 0.0
  structural_prior_bonus: 0.2
  interference_prior_bonus: 0.1
  entropy_prior_weight: 1.0
  surprisal_prior_weight: 0.8
  boundary_prior_weight: 1.0
  interference_prior_weight: 0.4
  gate_feature_prior_scale: 0.9
  gate_target_mode: prior_topk
  memory_residual_scale_init: 0.05
  memory_dropout: 0.0

training:
  batch_size: 32
  max_steps: 600
  learning_rate: 0.0008
  weight_decay: 0.01
  grad_clip: 1.0
  log_every: 25
  save_every: 600

evaluation:
  batch_size: 16
  tasks:
    blimp: data/eval_audit/blimp/data
    syntaxgym: data/eval_audit/syntaxgym
    fillergap: data/eval_audit/fillergap/fillergap.csv
    naturalstories: data/eval_audit/naturalstories/naturalstories.tsv

run_name: full_eval_template
seed: 13
device: auto
output_dir: outputs/full_eval_template

data:
  train_text_path: data/fixtures/tiny_corpus.txt
  eval_text_path: data/eval/babylm/dev.txt
  tokenizer_dir: outputs/smoke/tokenizer
  vocab_size: 8000
  block_size: 128

model:
  variant: etb
  d_model: 160
  hidden_size: 160
  num_layers: 1
  dropout: 0.1
  memory_slots: 8
  memory_roles: 8
  vsa_dim: 256
  gate_threshold: 0.5
  gate_selection: topk
  target_sparsity: 0.18
  sparsity_lambda: 0.001
  budget_lambda: 0.2
  benefit_lambda: 0.2
  candidate_loss_lambda: 0.05
  benefit_temperature: 0.25
  compute_penalty: 0.1
  structural_prior_bonus: 0.2
  interference_prior_bonus: 0.1
  memory_dropout: 0.05

training:
  batch_size: 16
  max_steps: 1
  learning_rate: 0.0008
  weight_decay: 0.01
  grad_clip: 1.0
  log_every: 1

evaluation:
  batch_size: 8
  tasks:
    blimp: data/eval/blimp/data
    syntaxgym: data/eval/syntaxgym
    fillergap: data/eval/fillergap/fillergap.csv
    naturalstories: data/eval/naturalstories/naturalstories.tsv
